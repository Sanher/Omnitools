name: Wrapper CI

on:
  push:
  pull_request:

jobs:
  addon-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          set -eu

          required_files="
          omnitools/config.yaml
          omnitools/Dockerfile
          omnitools/run.sh
          omnitools/nginx.conf
          omnitools/patches/omnitools-ingress-v0.6.0.patch
          "

          for file in $required_files; do
            test -f "$file"
          done

      - name: Build add-on image
        run: |
          docker build \
            --build-arg APP_REPO=https://github.com/iib0011/omni-tools.git \
            --build-arg APP_REF=v0.6.0 \
            --build-arg BUILD_FROM=ghcr.io/home-assistant/base:3.21 \
            -t omnitools-addon-ci:test \
            ./omnitools

      - name: Smoke test container
        run: |
          docker run --rm --entrypoint /bin/sh omnitools-addon-ci:test -c '
            set -eu
            nginx -t
            test -f /usr/share/nginx/html/index.html
            test -x /run.sh
            /bin/sh -n /run.sh
          '
